# ============================================================
# settings.yaml — regime-trader (eToro Edition)
# FUENTE DE VERDAD: portfolio_raw.json (2026-04-14)
# Capital: $546.14 | Objetivo: +20% en 120 días → $655.37
# ============================================================

broker:
  name: "etoro"
  environment: "real"               # "real" | "demo"
  base_url: "https://public-api.etoro.com/api/v1"
  expected_cid: 34044505
  polling_interval_seconds: 30      # No hay WebSocket de fills
  active_instruments:
# --- Tus posiciones actuales (Mantenlas para que el bot las gestione/venda) ---
    - 4238    # VOO
    - 14328   # MELI
    - 9408    # PLTR
    - 6218    # APP
    - 2488    # DAVE
    - 100000  # BTC (Bitcoin - ID aproximado de tu dashboard)
    
    # --- NUEVOS CANDIDATOS BALLENERA (IPO 2021-2025) ---
    - 99001   # REEMPLAZAR POR EL ID REAL EN ETORO -> NU
    - 99002   # REEMPLAZAR POR EL ID REAL EN ETORO -> RIVN
    - 99003   # REEMPLAZAR POR EL ID REAL EN ETORO -> HOOD
    - 99004   # REEMPLAZAR POR EL ID REAL EN ETORO -> DUOL
    - 99005   # REEMPLAZAR POR EL ID REAL EN ETORO -> RDDT
  timeframe: "1Day"
  # Mapeo eToro instrumentID → ticker Yahoo Finance (para datos históricos)
  # El endpoint de candles de eToro no está disponible en la API pública v1.
  instrument_symbols:
    4238:   "VOO"
    14328:  "MELI"
    9408:   "PLTR"
    6218:   "APP"
    2488:   "DAVE"
    100000: "BTC-USD"
    # --- Mapeo de Yahoo Finance para los nuevos candidatos ---
    99001:  "NU"
    99002:  "RIVN"
    99003:  "HOOD"
    99004:  "DUOL"
    99005:  "RDDT"

hmm:
  n_candidates: [3, 4, 5]
  n_init: 20
  covariance_type: "diag"
  min_train_bars: 500
  stability_bars: 2
  flicker_window: 20
  flicker_threshold: 4
  min_confidence: 0.55
  retrain_every_days: 7
  model_path: "models/hmm_model.pkl"

strategy:
  low_vol_allocation: 1.0            # 100% de exposición en baja volatilidad
  mid_vol_allocation_trend: 1.0      # 100% de exposición si hay tendencia a favor
  mid_vol_allocation_no_trend: 0.85  # Mantiene 85% expuesto incluso sin tendencia clara (asume rebote)
  high_vol_allocation: 0.80          # No se asusta en alta volatilidad (baja de 100 a 80 en vez de 60)
  low_vol_leverage: 1.5              # Usa un 50% de margen/apalancamiento en regímenes ultra seguros
  rebalance_threshold: 0.15          # Permite 15% de deriva; deja correr a los ganadores antes de rebalancear
  uncertainty_size_mult: 0.85        # Casi no reduce el tamaño de posición ante incertidumbre probabilística

risk:
  initial_equity: 560.05            # portfolio value actualizado 2026-04-16
  target_equity: 655.37
  target_date: "2026-08-12"
  max_risk_per_trade: 0.01          # 1% = $5.60
  max_exposure: 0.92                # 92% = $515.25
  max_leverage: 1.0
  max_single_position: 0.20         # 20% = $112.01
  target_position_size_usd: 112.01
  min_position_size_usd: 100.0
  max_concurrent: 5
  max_daily_trades: 10
  daily_dd_reduce: 0.02             # $10.92
  daily_dd_halt: 0.03               # $16.38
  weekly_dd_reduce: 0.05            # $27.31
  weekly_dd_halt: 0.07              # $38.23
  max_dd_from_peak: 0.10            # $54.61
  default_stop_loss_pct: 0.05
  urgent_stops:
    - position_id: 3403421461
      stop_loss_rate: 605.24        # 637.10 * 0.95
    - position_id: 3403428716
      stop_loss_rate: 198.08        # 208.50 * 0.95
    - position_id: 3403430868
      stop_loss_rate: 129.85        # 136.68 * 0.95
    - position_id: 3403433830
      stop_loss_rate: 410.40        # 432.00 * 0.95
    - position_id: 3403418899
      stop_loss_rate: 1760.83       # 1853.51 * 0.95

backtest:
  slippage_pct: 0.0005
  commission_per_trade: 1.0
  initial_capital: 546.14
  train_window: 252
  test_window: 126
  step_size: 126
  risk_free_rate: 0.045

whale:
  enabled: true
  reference_index: "SPY"            # índice de referencia para Fuerza Relativa
  rs_window: 252                    # ventana RS (1 año bursátil)
  rs_leader_threshold: 1.05         # RS ≥ 1.15 → Market Leader
  rs_laggard_threshold: 0.75        # RS ≤ 0.85 → Rezagado (descarte inmediato)
  max_stop_pct: 0.05                # stop loss máximo absoluto = 5%
  ballenera_position_pct: 0.20      # Ballenera: 20% del equity por operación
  corto_plazo_min_pct: 0.025        # Corto Plazo: tamaño mínimo
  corto_plazo_max_pct: 0.15         # Corto Plazo: tamaño máximo
  cup_min_depth_pct: 0.15           # Cup & Handle: profundidad mínima 15%
  cup_max_depth_pct: 0.60           # Cup & Handle: profundidad máxima 60%
  volume_breakout_mult: 1.5         # volumen en breakout ≥ 1.5× media 50d
  volume_climactic_mult: 2.0        # volumen climático para señal de salida
  min_confidence: 0.45              # confianza mínima para emitir señal Whale
  # Instrumentos objetivo para la pivotación (añadir en active_instruments también)
  # Criterios Ballenera: 1–5 años en bolsa, cap $300M–$50B
target_instruments:
    - symbol: "DAVE"
    - symbol: "NU"
    - symbol: "RIVN"
    - symbol: "HOOD"
    - symbol: "DUOL"
    - symbol: "RDDT"

monitoring:
  dashboard_refresh_seconds: 30
  alert_rate_limit_minutes: 15
  log_dir: "logs"
  log_max_bytes: 10485760           # 10 MB
  log_backup_count: 30
